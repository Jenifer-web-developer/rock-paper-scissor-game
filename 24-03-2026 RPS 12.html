<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock-Paper-Scissors</title>
  <style>
    body{
      background-color:black;
      font-family:Arial, Helvetica, sans-serif;
      color:white;
    }
    .move-img{
      height:50px;
    }
    .move-button{
      background-color:transparent;
      border: 3px solid white;
      height:130px;
      width:130px;
      border-radius:65px;
      margin-right:8px;
      cursor:pointer;
    }
    .css-result{
      margin-top:50px;
      margin-bottom:30px;
    }
    .css-scores{
      margin-top:50px;
    }
    .css-reset-button, .css-autoplay-button{
      background-color: white;
      font-size:16px;
      border:none;
      padding:8px 19px;
    }
  </style>
</head>
<body>
  <h3 style="font-size:30px; font-weight:bold;" >Rock-Paper-Scissors</h3>
  <p>
    <button class="move-button js-rock-button">
      <img src="rock-emoji.png" alt="rock" class="move-img"/>
    </button>
    <button class="move-button js-paper-button">
      <img src="paper-emoji.png" alt="paper" class="move-img"/>
    </button>
    <button class="move-button js-scissors-button">
      <img src="scissors-emoji.png" alt="scissors"class="move-img"/>
    </button>
    <p class="js-result css-result" style=" font-size:30px; font-weight:bold;"></p>
    <p class="js-move"></p>
    <p class="js-scores css-scores"></p>
    <button onclick="
          scores.wins=0;
          scores.loses=0;
          scores.ties=0;
          updateScoreElement();
          localStorage.removeItem('scores');
    " class="css-reset-button">Reset game</button>
    <button class="css-autoplay-button js-autoplay-button" onclick="autoPlay();">Auto play</button>
  </p>

  <script>
    let scores=JSON.parse(localStorage.getItem('scores')) || {wins:0,loses:0,ties:0};
    updateScoreElement();

    let isAutoPlaying=false;
    let intervalId;

    function autoPlay(){
      if(!isAutoPlaying){
        intervalId=setInterval(()=>{
        const playerMove=pickComputerMove();
        playerGame(playerMove);
        }, 1000);
        isAutoPlaying=true;
        document.querySelector('.js-autoplay-button').innerHTML='Stop auto play';
      }else{
        clearInterval(intervalId);
        isAutoPlaying=false;
        document.querySelector('.js-autoplay-button').innerHTML='Auto play';
      }
    }

    document.querySelector('.js-rock-button').addEventListener('click',()=>{
      playerGame('rock');
    });
    document.querySelector('.js-paper-button').addEventListener('click', ()=>{
      playerGame('paper');
    });
    document.querySelector('.js-scissors-button').addEventListener('click', ()=>{
      playerGame('scissors');
    });

    document.body.addEventListener('keydown',(event)=>{
      if(event.key === 'r' || event.key === 'R'){
        playerGame('rock');
      }
      else if(event.key === 'p' || event.key === 'P'){
        playerGame('paper');
      }
      else if(event.key === 's' || event.key === 'S'){
        playerGame('scissors');
      }
    });

    function playerGame(playerMove){
      const computerMove=pickComputerMove();

      let result='';

      if(playerMove==='scissors'){
        if(computerMove==='rock')
        {result='You lose';}
        else if(computerMove==='paper')
        {result='You win';}
        else
        {result='tie';}
      }
      else if(playerMove==='paper')
      {
        if(computerMove==='rock')
        {result='You win';}
        else if(computerMove==='paper')
        {result='tie';}
        else
        {result='You lose';}
      }
      else
      {
        if(computerMove=='rock')
        {result='tie';}
        else if(computerMove=='paper')
        {result='You lose';}
        else
        {result='You win';}
      }
      document.querySelector('.js-result').innerHTML=`${result}`;
      document.querySelector('.js-move').innerHTML=`
      You <img src="${playerMove}-emoji.png" class="move-img" alt="${playerMove}"/> 
      <img src="${computerMove}-emoji.png" class="move-img" alt="${computerMove}"/> Computer`

      if(result==='You win')
      {
        scores.wins+=1;
      }
      else if(result==='You lose')
      {
        scores.loses+=1;
      }
      else if(result==='tie')
      {
        scores.ties+=1;
      }
      updateScoreElement();

      localStorage.setItem('scores',JSON.stringify(scores));
    }

    function pickComputerMove(){
      let randomNumber=Math.random();
      let computerMove='';

      if(randomNumber>=0 && randomNumber<1/3)
      {computerMove='rock';}
      else if(randomNumber>=1/3 && randomNumber<2/3)
      {computerMove='paper';}
      else
      {computerMove='scissors';}
      
      return computerMove;
    }  
    
    function updateScoreElement(){
        document.querySelector('.js-scores').innerHTML=`Wins:${scores.wins}, Loses:${scores.loses}, Ties:${scores.ties}`;
    }

  </script>
</body>
</html>
